# docker-compose.yml — Sviluppo locale MagixPromotion
# Uso: cd deploy && docker compose up -d

x-common-env: &common-env
  DJANGO_SETTINGS_MODULE: config.settings.docker_dev
  DB_NAME: magix
  DB_USER: magix
  DB_PASSWORD: magix_dev
  DB_HOST: db
  DB_PORT: "5432"
  REDIS_URL: redis://redis:6379/0
  DJANGO_SECRET_KEY: dev-secret-key-not-for-production
  CELERY_BROKER_URL: redis://redis:6379/1
  WAGTAILADMIN_BASE_URL: http://localhost:8000
  GEMINI_API_KEY: ${GEMINI_API_KEY:-placeholder}
  NOMINATIM_USER_AGENT: magix-promotion-dev
  MATOMO_URL: ${MATOMO_URL:-//piwik.gpsbooking.com/}
  MATOMO_SITE_ID: ${MATOMO_SITE_ID:-14}
  GOOGLE_ANALYTICS_ID: ${GOOGLE_ANALYTICS_ID:-}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: magix
      POSTGRES_USER: magix
      POSTGRES_PASSWORD: magix_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magix"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  django:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: runtime
    entrypoint: []
    command: >
      sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    environment:
      <<: *common-env
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: runtime
    entrypoint: []
    command: >
      celery -A config worker -l info -B
    environment:
      <<: *common-env
    volumes:
      - ..:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://django:8000
    depends_on:
      - django

volumes:
  postgres_data:
  static_files:
  media_files:
  frontend_node_modules:
