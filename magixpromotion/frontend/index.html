<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Magix Promotion — Agenzia di booking e management musicale</title>
    <meta
      name="description"
      content="Magix Promotion — Agenzia di booking e management musicale. Band, artisti e DJ per eventi, concerti, matrimoni e feste private in Italia e nel mondo."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Theme color (mobile browser toolbar) -->
    <meta name="theme-color" content="#0f0f14" />

    <!-- Open Graph fallback (sovrascritti da SEOHead React appena monta) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Magix Promotion" />
    <meta property="og:locale" content="it_IT" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:title" content="Magix Promotion — Agenzia di booking musicale" />
    <meta property="og:description" content="Band, artisti e DJ per eventi, concerti, matrimoni e feste private in Italia e nel mondo." />
    <meta property="og:url" content="https://new.magixpromotion.com/" />

    <!-- Twitter Cards fallback -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Magix Promotion — Agenzia di booking musicale" />
    <meta name="twitter:description" content="Band, artisti e DJ per eventi, concerti e feste private." />

    <!-- Canonical (overridden by React SEOHead) -->
    <link rel="canonical" href="https://new.magixpromotion.com/" />

    <!-- Preload critical fonts to avoid render-blocking cascade -->
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/space-grotesk-latin.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
