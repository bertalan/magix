name: Deploy Production (LIVE)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to LIVE server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 100
          script: |
            SITE_DIR="/www/wwwroot/magixpromotion.com"
            APP_DIR="${SITE_DIR}/magixpromotion"
            VENV_DIR="${SITE_DIR}/venv"

            cd "${SITE_DIR}"
            git pull origin main

            # Backend
            source "${VENV_DIR}/bin/activate"
            pip install -q -r "${APP_DIR}/requirements/production.txt"
            cd "${APP_DIR}"
            DJANGO_SETTINGS_MODULE=config.settings.production \
              python manage.py migrate --noinput
            DJANGO_SETTINGS_MODULE=config.settings.production \
              python manage.py collectstatic --noinput 2>/dev/null

            # Frontend
            cd "${APP_DIR}/frontend" && npm ci --production=false --silent && npm run build

            # Restart services
            systemctl restart gunicorn-magix celery-magix
            /www/server/nginx/sbin/nginx -s reload
            echo "Deploy LIVE completato: ${{ github.sha }}"
