# ─── Upstream Gunicorn ─────────────────────────────────────────────
upstream magix_gunicorn {
    server unix:/www/wwwroot/magixpromotion.com/magixpromotion/magix.sock fail_timeout=0;
}

# ─── Bot detection: serve Wagtail templates (with SEO meta/JSON-LD) to crawlers ──
map $http_user_agent $is_bot {
    default                     0;
    ~*googlebot                 1;
    ~*bingbot                   1;
    ~*slurp                     1;
    ~*duckduckbot               1;
    ~*baiduspider               1;
    ~*yandexbot                 1;
    ~*facebookexternalhit       1;
    ~*facebot                   1;
    ~*twitterbot                1;
    ~*linkedinbot               1;
    ~*whatsapp                  1;
    ~*telegrambot               1;
    ~*slackbot                  1;
    ~*discordbot                1;
    ~*pinterestbot              1;
    ~*semrushbot                1;
    ~*ahrefsbot                 1;
    ~*mj12bot                   1;
    ~*rogerbot                  1;
    ~*dotbot                    1;
    ~*petalbot                  1;
    ~*applebot                  1;
    ~*gptbot                    1;
    ~*chatgpt-user              1;
    ~*claudebot                 1;
    ~*ia_archiver               1;
    ~*archive\.org_bot          1;
    ~*google-structured-data    1;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name new.magixpromotion.com magixpromotion.com www.magixpromotion.com;

    # Let's Encrypt ACME challenge
    location ~ \.well-known {
        root /www/wwwroot/magixpromotion.com;
        allow all;
    }

    location / {
        return 301 https://new.magixpromotion.com$request_uri;
    }

    access_log /www/wwwlogs/magixpromotion.com.log;
    error_log /www/wwwlogs/magixpromotion.com.error.log;
}

# ─── HTTPS ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name new.magixpromotion.com;

    ssl_certificate /etc/letsencrypt/live/new.magixpromotion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/new.magixpromotion.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:MagixSSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Hide sensitive paths
    location ~ ^/(\.user\.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README\.md|\.gitignore|manage\.py|celerybeat|db\.sqlite3|requirements|deploy|venv|__pycache__) {
        return 404;
    }

    # ── Django backend routes (API, Admin, Docs, SEO) ──────────────
    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://magix_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        client_max_body_size 20M;
    }

    location /admin/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://magix_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        client_max_body_size 20M;
    }

    location /django-admin/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://magix_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        client_max_body_size 20M;
    }

    location /documents/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://magix_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }

    location /press/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://magix_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }

    location = /sitemap.xml {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://magix_gunicorn;
    }

    location = /robots.txt {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://magix_gunicorn;
    }

    # ── Static / Media files ───────────────────────────────────────
    location /static/ {
        alias /www/wwwroot/magixpromotion.com/magixpromotion/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /www/wwwroot/magixpromotion.com/magixpromotion/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── SPA built assets (JS, CSS) ────────────────────────────────
    location /assets/ {
        alias /www/wwwroot/magixpromotion.com/magixpromotion/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback: serve index.html for all other routes ───────
    # Bots/crawlers get Wagtail templates (with SEO meta + JSON-LD)
    # Real users get the React SPA
    location @django_backend {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://magix_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        # Bot → Django (Wagtail templates con meta OG, canonical, JSON-LD)
        if ($is_bot) {
            rewrite ^ /bot-proxy$uri last;
        }

        # Human → SPA
        root /www/wwwroot/magixpromotion.com/magixpromotion/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # Internal-only: proxy bot requests to Django
    location /bot-proxy/ {
        internal;
        rewrite ^/bot-proxy(.*)$ $1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://magix_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    access_log /www/wwwlogs/magixpromotion.com.ssl.log;
    error_log /www/wwwlogs/magixpromotion.com.ssl.error.log;
}
