<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>500 — MagixPromotion</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#080112;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .bg{position:fixed;inset:0;z-index:0}
  .bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(112,0,255,.15),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(255,0,247,.1),transparent 50%);animation:drift 20s ease-in-out infinite alternate}
  @keyframes drift{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(30px,-20px) rotate(3deg)}}
  .container{position:relative;z-index:1;text-align:center;padding:2rem;max-width:600px}
  .code{font-family:'Space Grotesk',system-ui,sans-serif;font-size:clamp(6rem,20vw,10rem);font-weight:700;line-height:1;background:linear-gradient(90deg,#ff00f7,#7000ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
  .pulse{animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
  h1{font-family:'Space Grotesk',system-ui,sans-serif;font-size:1.5rem;font-weight:600;margin-bottom:1rem;color:rgba(255,255,255,.9)}
  p{color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:2rem;font-size:.95rem}
  .actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;border-radius:9999px;font-size:.9rem;font-weight:500;text-decoration:none;transition:all .3s ease}
  .btn-primary{background:linear-gradient(135deg,#ff00f7,#7000ff);color:#fff;box-shadow:0 4px 20px rgba(255,0,247,.3)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(255,0,247,.45)}
  .btn-outline{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
  .btn-outline:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:#fff}
  .btn-retry{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
  .btn-retry:hover{background:rgba(255,255,255,.1);color:#fff}
  .details{margin-top:2.5rem;padding:1rem 1.5rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;text-align:left;font-size:.8rem;color:rgba(255,255,255,.35)}
  .details span{color:rgba(255,255,255,.5)}
  .icon{width:20px;height:20px;vertical-align:middle}
  .alert-icon{display:flex;align-items:center;justify-content:center;width:64px;height:64px;margin:0 auto 1rem;border-radius:50%;background:rgba(255,0,247,.08);border:2px solid rgba(255,0,247,.2)}
  .alert-icon svg{width:32px;height:32px;color:#ff00f7;animation:shake 4s ease-in-out infinite}
  @keyframes shake{0%,90%,100%{transform:rotate(0deg)}92%{transform:rotate(-5deg)}94%{transform:rotate(5deg)}96%{transform:rotate(-3deg)}98%{transform:rotate(3deg)}}
  .lang-switch{position:absolute;top:1.5rem;right:1.5rem;z-index:2}
  .lang-switch a{color:rgba(255,255,255,.4);text-decoration:none;font-size:.8rem;padding:.3rem .6rem;border:1px solid rgba(255,255,255,.1);border-radius:6px;transition:all .3s}
  .lang-switch a:hover{color:#fff;border-color:rgba(255,0,247,.4)}
</style>
<script>
var LANG=(function(){var p=window.location.pathname;return p.match(/^\/en(\/|$)/)? 'en':'it'})();
var T={
  it:{
    title:'500 — Errore del server | MagixPromotion',
    h1:'Errore del server',
    desc:'Si è verificato un errore interno. Il nostro team è stato notificato. Puoi riprovare tra qualche istante o segnalarci il problema.',
    home:'Torna alla Home',
    retry:'Riprova',
    report:'Segnala il problema',
    errorLabel:'Codice: 500 - Errore interno del server',
    subject:'Errore 500 su MagixPromotion',
    direct:'(diretto)',
    promptDesc:'[Scrivi qui cosa stavi facendo quando è apparso l\'errore]',
    switchLang:'EN',switchHref:'/en/'
  },
  en:{
    title:'500 — Server Error | MagixPromotion',
    h1:'Server Error',
    desc:'An internal error occurred. Our team has been notified. You can try again in a moment or report the issue to us.',
    home:'Back to Home',
    retry:'Retry',
    report:'Report this issue',
    errorLabel:'Code: 500 - Internal Server Error',
    subject:'Error 500 on MagixPromotion',
    direct:'(direct)',
    promptDesc:'[Describe what you were doing when this error appeared]',
    switchLang:'IT',switchHref:'/it/'
  }
};
var t=T[LANG];
function getErrorDetails(){
  var d=new Date().toISOString();
  var u=window.location.href;
  var r=document.referrer||t.direct;
  var ua=navigator.userAgent;
  return t.errorLabel
    +'\nURL: '+u
    +'\nReferrer: '+r
    +'\nData/Ora: '+d
    +'\nBrowser: '+ua
    +'\nSchermo: '+screen.width+'x'+screen.height
    +'\nLingua: '+navigator.language
    +'\nConnessione: '+(navigator.connection?navigator.connection.effectiveType:'N/D')
    +'\n\n'+t.promptDesc;
}
function buildMailto(){
  var subj=encodeURIComponent(t.subject);
  var body=encodeURIComponent(getErrorDetails());
  return 'mailto:info@magixpromotion.it?subject='+subj+'&body='+body;
}
function retry(){window.location.reload()}
document.addEventListener('DOMContentLoaded',function(){
  document.documentElement.lang=LANG;
  document.title=t.title;
  document.getElementById('heading').textContent=t.h1;
  document.getElementById('description').textContent=t.desc;
  document.getElementById('home-label').textContent=t.home;
  document.getElementById('retry-label').textContent=t.retry;
  document.getElementById('report-label').textContent=t.report;
  document.getElementById('switch-lang').textContent=t.switchLang;
  document.getElementById('switch-lang').href=t.switchHref;
  var el=document.getElementById('mailto-link');
  if(el) el.href=buildMailto();
  var ts=document.getElementById('ts');
  if(ts) ts.textContent=new Date().toLocaleString(LANG==='en'?'en-GB':'it-IT');
});
</script>
</head>
<body>
<div class="lang-switch"><a id="switch-lang" href="/en/">EN</a></div>
<div class="bg"></div>
<div class="container">
  <div class="alert-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
  </div>
  <div class="code pulse">500</div>
  <h1 id="heading">Errore del server</h1>
  <p id="description">Si è verificato un errore interno. Il nostro team è stato notificato. Puoi riprovare tra qualche istante o segnalarci il problema.</p>
  <div class="actions">
    <a href="/" class="btn btn-primary">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span id="home-label">Torna alla Home</span>
    </a>
    <a href="javascript:retry()" class="btn btn-retry">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
      <span id="retry-label">Riprova</span>
    </a>
    <a id="mailto-link" href="#" class="btn btn-outline">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      <span id="report-label">Segnala il problema</span>
    </a>
  </div>
  <div class="details">
    <span>Timestamp:</span> <span id="ts"></span><br>
    <span>URL:</span> <script>document.write(window.location.href)</script>
  </div>
</div>
</body>
</html>
